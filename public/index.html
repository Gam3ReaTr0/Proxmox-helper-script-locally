<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxmox Helper Scripts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --bg: #0f1115;
            --panel: #171a21;
            --panel-2: #1f232d;
            --card: #1b2029;
            --card-hover: #222937;
            --line: #313744;
            --line-soft: rgba(255,255,255,0.08);
            --text: #eef2f8;
            --muted: #98a2b3;
            --faint: #697386;
            --accent: #ff8a3d;
            --blue: #4cc9f0;
            --green: #35c46b;
            --red: #ff5c70;
            --shadow: 0 18px 60px rgba(0,0,0,0.35);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background:
                linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
                var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 32px 32px;
            opacity: 0.12;
            mask-image: linear-gradient(180deg, rgba(0,0,0,0.42), transparent 84%);
        }

        button, input { font: inherit; }
        button { border: 0; }
        #root { width: 100%; height: 100%; }
        .app-shell { display: flex; width: 100%; height: 100%; position: relative; }
        .app-shell svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 1.9;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar {
            width: 315px;
            flex: 0 0 315px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #151a22, #11161d);
            border-right: 1px solid var(--line-soft);
            overflow: hidden;
            padding: 18px 16px 22px;
            box-shadow: inset -1px 0 0 rgba(255,255,255,0.02);
            transition: width 0.22s ease, flex-basis 0.22s ease, padding 0.22s ease;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(33,38,49,0.98), rgba(22,27,36,0.98));
            margin-bottom: 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 22px rgba(0,0,0,0.14);
        }

        .brand-main {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .brand-copy {
            min-width: 0;
        }

        .brand-mark,
        .category-icon,
        .script-fallback {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(255,138,61,0.16), rgba(255,138,61,0.08));
            color: var(--accent);
            border: 1px solid rgba(255,138,61,0.3);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .brand-title { font-size: 16px; font-weight: 850; line-height: 1.1; }
        .brand-subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; }

        .sidebar-sections {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding-right: 2px;
        }

        .sidebar-toolbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 42px;
            gap: 8px;
            margin-top: 14px;
        }

        .sidebar-bottom {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--line-soft);
        }

        .sidebar-settings-btn {
            width: 100%;
            height: 42px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            color: var(--text);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025));
            border: 1px solid var(--line-soft);
            cursor: pointer;
            font-weight: 850;
            padding: 0 12px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
        }

        .sidebar-settings-btn:hover {
            border-color: rgba(76,201,240,0.24);
            background: rgba(76,201,240,0.09);
        }

        .sidebar-view-btn {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025));
            border: 1px solid var(--line-soft);
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
            transition: color 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .sidebar-view-btn:hover {
            color: var(--text);
            border-color: rgba(255,138,61,0.24);
            background: rgba(255,138,61,0.09);
        }

        .sidebar-toolbar .sidebar-view-btn {
            width: 100%;
        }

        .sidebar-settings-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-heading {
            color: var(--muted);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 8px 10px;
        }

        .sidebar-groups {
            display: grid;
            gap: 8px;
        }

        .sidebar-group {
            border: 1px solid var(--line-soft);
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
            transition: border-color 0.18s ease, background 0.18s ease;
        }

        .sidebar-group-toggle {
            width: 100%;
            min-height: 42px;
            display: grid;
            grid-template-columns: 28px 1fr auto 18px;
            align-items: center;
            gap: 9px;
            color: var(--text);
            background: rgba(255,255,255,0.025);
            border-bottom: 1px solid transparent;
            cursor: pointer;
            padding: 9px 10px;
            text-align: left;
            transition: background 0.18s ease, border-color 0.18s ease;
        }

        .sidebar-group-toggle:hover {
            background: rgba(255,255,255,0.045);
        }

        .sidebar-group.open .sidebar-group-toggle {
            border-bottom-color: var(--line-soft);
        }

        .group-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            background: rgba(76,201,240,0.09);
            border: 1px solid rgba(76,201,240,0.14);
        }

        .group-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 850;
        }

        .group-count {
            color: var(--muted);
            font-size: 11px;
            font-weight: 850;
            min-width: 28px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            border-radius: 999px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }

        .group-chevron {
            color: var(--muted);
            transition: transform 0.18s ease;
        }

        .sidebar-group.open .group-chevron {
            transform: rotate(90deg);
        }

        .sidebar-group-list {
            display: none;
            padding: 6px;
        }

        .sidebar-group.open .sidebar-group-list {
            display: grid;
            gap: 4px;
        }

        .sidebar-item {
            display: grid;
            grid-template-columns: 30px 1fr auto;
            align-items: center;
            gap: 9px;
            width: 100%;
            min-height: 40px;
            color: var(--muted);
            background: transparent;
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 5px 7px;
            cursor: pointer;
            text-align: left;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
        }

        .sidebar-item:hover {
            background: rgba(255,255,255,0.045);
            border-color: var(--line-soft);
            color: var(--text);
            transform: translateX(2px);
        }

        .sidebar-item.active {
            background: linear-gradient(180deg, rgba(255,138,61,0.12), rgba(255,138,61,0.08));
            border-color: rgba(255,138,61,0.26);
            color: var(--text);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .category-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            color: var(--blue);
            background: rgba(76,201,240,0.1);
            border: 1px solid rgba(76,201,240,0.16);
        }

        .sidebar-item.active .category-icon {
            color: var(--accent);
            background: rgba(255,138,61,0.14);
            border-color: rgba(255,138,61,0.24);
        }

        .category-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            font-weight: 760;
        }

        .count-pill {
            min-width: 24px;
            height: 22px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 11px;
            font-weight: 800;
            padding: 0 8px;
        }

        .main {
            flex: 1;
            min-width: 0;
            overflow-y: auto;
            padding: 24px 24px 28px;
        }

        .main-stage {
            max-width: 1560px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .main-stage > * {
            min-width: 0;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 430px);
            gap: 18px;
            align-items: center;
            padding: 20px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: linear-gradient(180deg, #242a35, #181e27);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 14px 28px rgba(0,0,0,0.14);
            position: relative;
            z-index: 1;
            overflow: hidden;
            isolation: isolate;
        }

        .topbar::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(255,138,61,0.07), transparent 38%),
                linear-gradient(180deg, rgba(255,255,255,0.025), transparent 80%);
            pointer-events: none;
        }

        .topbar-lead {
            display: grid;
            grid-template-columns: 56px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .topbar-icon {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--blue);
            background: linear-gradient(180deg, rgba(76,201,240,0.12), rgba(76,201,240,0.06));
            border: 1px solid rgba(76,201,240,0.18);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .topbar-copy,
        .topbar-actions {
            min-width: 0;
        }

        .topbar-actions {
            display: grid;
            gap: 10px;
            align-self: stretch;
        }

        .topbar-label {
            color: var(--faint);
            font-size: 11px;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding-left: 2px;
        }

        .topbar > * { min-width: 0; }
        .topbar > * { position: relative; z-index: 1; }

        .eyebrow {
            color: var(--accent);
            font-size: 12px;
            font-weight: 850;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            line-height: 1.15;
            letter-spacing: 0;
        }

        .header-meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
            max-width: 640px;
        }

        .meta-pill,
        .script-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 8px;
            border: 1px solid var(--line-soft);
            background: rgba(255,255,255,0.035);
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            line-height: 1.2;
            padding: 10px 12px;
            min-height: 42px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .meta-pill {
            width: 100%;
            justify-content: flex-start;
        }

        .meta-pill svg {
            color: var(--blue);
        }

        .search-shell {
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(19,24,32,0.72), rgba(12,15,20,0.5));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
        }

        .search-box {
            position: relative;
            display: grid;
            grid-template-columns: 18px minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            min-height: 56px;
            padding: 0 14px;
            color: var(--muted);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(11,14,20,0.96), rgba(8,11,17,0.98));
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        }

        .search-box:hover {
            border-color: rgba(76,201,240,0.22);
        }

        .search-box input {
            width: 100%;
            min-width: 0;
            height: auto;
            border: 0;
            background: transparent;
            color: var(--text);
            outline: none;
            padding: 0;
            box-shadow: none;
            font-size: 15px;
            font-weight: 760;
        }

        .search-box-icon {
            color: var(--blue);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .search-meta {
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.04);
            color: var(--muted);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 850;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .search-box input::placeholder,
        .global-search-field input::placeholder {
            color: #7e8899;
        }

        .search-box:focus-within {
            border-color: rgba(255,138,61,0.56);
            box-shadow: 0 0 0 3px rgba(255,138,61,0.12);
            transform: translateY(-1px);
        }

        .search-box input:focus {
            box-shadow: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 360px), 1fr));
            gap: 20px;
            align-items: stretch;
        }

        .card {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 286px;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(76,201,240,0.07), transparent 34%),
                radial-gradient(circle at bottom right, rgba(255,138,61,0.04), transparent 28%),
                linear-gradient(180deg, rgba(34,40,52,0.96), rgba(23,28,37,0.99));
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.035), 0 10px 24px rgba(0,0,0,0.12);
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0 0 auto;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,138,61,0.55), rgba(76,201,240,0.14), transparent);
            opacity: 0.7;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: rgba(76,201,240,0.26);
            background:
                radial-gradient(circle at top left, rgba(76,201,240,0.1), transparent 38%),
                radial-gradient(circle at bottom right, rgba(255,138,61,0.05), transparent 32%),
                linear-gradient(180deg, rgba(39,46,60,0.98), rgba(26,31,41,1));
            box-shadow: 0 18px 42px rgba(0,0,0,0.22);
        }

        .card-main {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 0;
        }

        .card-top {
            display: flex;
            align-items: stretch;
            justify-content: space-between;
            gap: 14px;
            min-width: 0;
            padding: 18px 18px 16px;
            background: linear-gradient(180deg, rgba(255,255,255,0.022), rgba(255,255,255,0));
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .card-top.readable {
            cursor: pointer;
        }

        .card-top.readable:hover {
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.004));
        }

        .card-top.readable:hover h2 {
            color: var(--blue);
        }

        .card-top-main {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .card-top-cue {
            width: 28px;
            height: 28px;
            flex: 0 0 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--faint);
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.06);
            transform: translateX(0);
            transition: color 0.18s ease, transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .card-top.readable:hover .card-top-cue {
            color: var(--blue);
            border-color: rgba(76,201,240,0.18);
            background: rgba(76,201,240,0.08);
            transform: translateX(2px);
        }

        .logo-wrap {
            position: relative;
            width: 50px;
            height: 50px;
            flex: 0 0 50px;
            border-radius: 8px;
            overflow: hidden;
            background: transparent;
            border: 0;
            box-shadow: none;
        }

        .logo-wrap::before {
            content: none;
        }

        .card:hover .logo-wrap {
            border-color: transparent;
            box-shadow: none;
        }

        .script-logo,
        .script-fallback {
            position: relative;
            z-index: 1;
        }

        .script-logo {
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 7px;
            background: transparent;
            filter: none;
        }

        .script-fallback {
            width: 100%;
            height: 100%;
            color: #2b85b0;
            font-weight: 900;
            font-size: 19px;
        }

        .script-title-wrap {
            min-width: 0;
            flex: 1;
            display: grid;
            gap: 10px;
            padding-top: 2px;
        }
        .card h2 {
            margin: 0;
            color: var(--text);
            font-size: 16px;
            line-height: 1.22;
            letter-spacing: 0;
            overflow-wrap: anywhere;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .script-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            min-height: 0;
        }

        .script-badge {
            min-height: 0;
            border-radius: 999px;
            line-height: 1;
            padding: 7px 10px;
            font-size: 11px;
            font-weight: 850;
        }

        .script-badge.type { color: #b6e7ff; border-color: rgba(76,201,240,0.2); background: rgba(76,201,240,0.09); }
        .script-badge.privileged { color: #ffd0d7; border-color: rgba(255,92,112,0.26); background: rgba(255,92,112,0.1); }
        .script-badge.dev { color: #ffe1c7; border-color: rgba(255,138,61,0.28); background: rgba(255,138,61,0.11); }
        .script-badge.arm { color: #c7f7d7; border-color: rgba(53,196,107,0.24); background: rgba(53,196,107,0.1); }

        .card-summary {
            display: flex;
            align-items: flex-start;
            min-height: 112px;
            padding: 18px 18px 20px;
            border-top: 0;
        }

        .card p {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
            margin: 0;
            min-height: 72px;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            display: grid;
            grid-template-columns: 1fr 1fr 42px;
            gap: 10px;
            align-items: center;
            margin-top: auto;
            padding: 14px 18px 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background:
                linear-gradient(180deg, rgba(255,255,255,0.025), transparent 18%),
                linear-gradient(180deg, rgba(12,16,22,0.2), rgba(10,13,18,0.42));
        }

        function Icon({ name, title }) {
            const paths = {

                home: <><path d="m3 11 9-8 9 8" /><path d="M5 10v10h14V10" /><path d="M9 20v-6h6v6" /></>,
                info: <><circle cx="12" cy="12" r="9" /><path d="M12 10v6" /><path d="M12 7h.01" /></>,
                library: <><rect x="5" y="5" width="14" height="5" rx="1.5" /><rect x="5" y="14" width="14" height="5" rx="1.5" /><path d="M8 7.5h8" /><path d="M8 16.5h8" /></>,
                lock: <><rect x="5" y="10" width="14" height="10" rx="2" /><path d="M8 10V7a4 4 0 0 1 8 0v3" /></>,
                monitor: <><rect x="4" y="5" width="16" height="11" rx="2" /><path d="M8 21h8" /><path d="M12 16v5" /></>,
                'panel-close': <><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4" /><path d="M8 5v14" /><path d="m15 9 4 3-4 3" /></>,
                'panel-open': <><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4" /><path d="M16 5v14" /><path d="m9 9-4 3 4 3" /></>,
                play: <><path d="M8 5v14l11-7-11-7Z" /></>,
                rocket: <><path d="M5 14c-1.4 1.1-2 2.7-2 5 2.3 0 3.9-.6 5-2" /><path d="M9 15 5 11l4-5 4 4" /><path d="m14 11 4 4-5 4-4-4" /><path d="M14 6c1.5-1.6 3.3-2.5 6-2-.5 2.7-1.4 4.5-3 6" /></>,
                search: <><circle cx="10.5" cy="10.5" r="6.5" /><path d="m16 16 4 4" /></>,
                server: <><rect x="4" y="4" width="16" height="6" rx="2" /><rect x="4" y="14" width="16" height="6" rx="2" /><path d="M8 7h.01" /><path d="M8 17h.01" /></>,
                settings: <><circle cx="12" cy="12" r="3" /><path d="M19 12a7 7 0 0 0-.1-1l2-1.6-2-3.4-2.4 1a7.9 7.9 0 0 0-1.7-1L14.4 2h-4.8l-.4 2.9a7.9 7.9 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12c0 .3 0 .7.1 1l-2 1.6 2 3.4 2.4-1a7.9 7.9 0 0 0 1.7 1l.4 2.9h4.8l.4-2.9a7.9 7.9 0 0 0 1.7-1l2.4 1 2-3.4-2-1.6c.1-.3.1-.7.1-1Z" /></>,
                shield: <><path d="M12 3 5 6v5c0 4.5 3 8 7 10 4-2 7-5.5 7-10V6l-7-3Z" /><path d="m9 12 2 2 4-5" /></>,
                spark: <><path d="M12 3 9.8 9.8 3 12l6.8 2.2L12 21l2.2-6.8L21 12l-6.8-2.2L12 3Z" /></>,
                x: <><path d="M6 6l12 12" /><path d="M18 6 6 18" /></>,

            return (
                <svg viewBox="0 0 24 24" aria-hidden={title ? undefined : true} role={title ? 'img' : undefined}>
                    {title && <title>{title}</title>}
                    {paths[name] || paths.spark}
                </svg>
            );
        }

        function titleCase(value) {
            return value.replace(/\b\w/g, char => char.toUpperCase());
        }

        function cleanText(value) {
            return String(value || '')
                .replace(/<\/p>\s*<p[^>]*>/gi, '\n\n')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<\/?(p|strong|em|b|i|ul|ol|li|a|code|pre|span|div|h[1-6])\b[^>]*>/gi, '')
                .replace(/&nbsp;/gi, ' ')
                .replace(/&amp;/gi, '&')
                .replace(/&lt;/gi, '<')
                .replace(/&gt;/gi, '>')
                .replace(/&quot;/gi, '"')
                .replace(/&#39;/gi, "'")
                .replace(/<\/p>\s*<p[^>]*>/gi, '\n\n')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<\/?(p|strong|em|b|i|ul|ol|li|a|code|pre|span|div|h[1-6])\b[^>]*>/gi, '')
                .replace(/[ \t]+\n/g, '\n')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        function normalizeNotes(notes) {
            return Array.isArray(notes)
                ? notes.map(note => ({ ...note, text: cleanText(note.text) })).filter(note => note.text)
                : [];
        }

        function sourceUrlForPath(scriptPath) {
            return `${RAW_SCRIPT_BASE_URL}/${String(scriptPath || '').replace(/^\/+/, '')}`;
        }

        function githubUrlForPath(scriptPath) {
            return `https://github.com/community-scripts/ProxmoxVE/blob/main/${String(scriptPath || '').replace(/^\/+/, '')}`;
        }

        function installCommandForPath(scriptPath) {
            return `bash -c "$(curl -fsSL ${sourceUrlForPath(scriptPath)})"`;
        }

        function slugify(value) {
            return String(value || '')
                .toLowerCase()
                .trim()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function categorySlug(value) {
            return String(value || '')
                .toLowerCase()
                .replace(/&/g, ' and ')
                .replace(/\*/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function categoryFromUrl(categoryNames) {
            const requested = new URLSearchParams(window.location.search).get('category');
            if (!requested) return '';

            return categoryNames.find(categoryName => categorySlug(categoryName) === requested) || '';
        }

        function scriptSlugFromPath() {
            const match = window.location.pathname.match(/^\/scripts\/([^/]+)/);
            return match ? decodeURIComponent(match[1]) : '';
        }

        function categoryIconName(category) {
            return CATEGORY_ICONS.find(entry => entry.match.test(category))?.icon || 'spark';
        }

        function sidebarGroupsForCategories(categoryNames) {
            const available = new Set(categoryNames);
            const used = new Set();
            const groups = SIDEBAR_GROUPS.map(group => {
                const categories = group.categories.filter(category => available.has(category));
                categories.forEach(category => used.add(category));
                return { ...group, categories };
            }).filter(group => group.categories.length > 0);
            const leftover = categoryNames.filter(category => !used.has(category));

            if (leftover.length > 0) {
                groups.push({
                    name: 'Other',
                    icon: 'spark',
                    categories: leftover,
                });
            }

            return groups;
        }

        function addScriptToCategory(grouped, categoryName, script) {
            if (!grouped[categoryName]) grouped[categoryName] = [];
            if (!grouped[categoryName].some(existing => (existing.slug || existing.name) === (script.slug || script.name))) {
                grouped[categoryName].push(script);
            }
        }

        function orderGroupedCategories(grouped, orderedCategoryNames = OFFICIAL_CATEGORY_ORDER) {
            const ordered = {};

            orderedCategoryNames.forEach(categoryName => {
                if (grouped[categoryName]?.length) {
                    ordered[categoryName] = grouped[categoryName];
                }
            });

            Object.entries(grouped).forEach(([categoryName, scripts]) => {
                if (!ordered[categoryName] && scripts.length) {
                    ordered[categoryName] = scripts;
                }
            });

            return ordered;
        }

        function isVisibleOfficialScript(script) {
            return !script?.is_disabled
                && !script?.is_deleted
                && !script?.disable_message
                && !script?.deleted_message;
        }

        function normalizeScripts(data) {
            if (!data) return {};
            if (!Array.isArray(data) && Object.values(data).every(Array.isArray)) {
                const filtered = Object.fromEntries(
                    Object.entries(data).map(([categoryName, scripts]) => [
                        categoryName,
                        scripts.filter(isVisibleOfficialScript),
                    ])
                );

                return orderGroupedCategories(filtered, Object.keys(data));
            }

            const scripts = Array.isArray(data) ? data : data.scripts || data.items || [];
            const categoryList = data.categories || [];
            const categoryById = new Map(categoryList.map(category => [category.id, category]));
            const officialCategoryNames = categoryList.length
                ? categoryList
                    .slice()
                    .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))
                    .map(category => category.name)
                : OFFICIAL_CATEGORY_ORDER;
            const grouped = {};

            officialCategoryNames.forEach(categoryName => {
                grouped[categoryName] = [];
            });

            scripts.forEach(script => {
                if (!isVisibleOfficialScript(script)) return;

                const categories = script.expand?.categories?.length ? script.expand.categories : script.categories || script.category;
                const rawCategories = Array.isArray(categories) ? categories : categories ? [categories] : [];
                const categoryNames = rawCategories
                    .map(category => {
                        if (!category) return null;
                        if (typeof category === 'string') return categoryById.get(category)?.name || category;
                        return category.name || category.title || category.id || null;
                    })
                    .filter(categoryName => categoryName && (categoryList.length === 0 || officialCategoryNames.includes(categoryName)));

                const normalizedScript = {
                    ...script,
                    slug: script.slug || slugify(script.name),
                    description: cleanText(script.description),
                    notes: normalizeNotes(script.notes),
                    categories: categoryNames.length ? categoryNames : ['Miscellaneous'],
                };

                normalizedScript.categories.forEach(categoryName => {
                    addScriptToCategory(grouped, categoryName, normalizedScript);
                });
            });

            return orderGroupedCategories(grouped, officialCategoryNames);
        }

        function displayCategoryName(category) {
            return category.includes(' ') || category.includes('&') || category.includes('/')
                ? category
                : titleCase(category);
        }

        function ScriptLogo({ script }) {
            const [logoFailed, setLogoFailed] = useState(false);
            const initial = (script.name || '?').trim().charAt(0).toUpperCase();
            const hasLogo = Boolean(script.logo) && !logoFailed;

            useEffect(() => {
                setLogoFailed(false);
            }, [script.logo]);

            return (
                <div className="logo-wrap">
                    {!hasLogo && <span className="script-fallback">{initial}</span>}
                    {hasLogo && (
                        <img
                            className="script-logo"
                            src={script.logo}
                            alt=""
                            loading="lazy"
                            onError={() => setLogoFailed(true)}
                        />

                </div>
            );
        }

        function ScriptBadges({ script }) {
            const type = script.type || script.expand?.type?.type || 'script';

            return (

                    {script.has_arm && <span className="script-badge arm"><Icon name="arm" />ARM</span>}

        function formatDate(value) {
            if (!value) return '';
            const date = new Date(value);
            if (Number.isNaN(date.getTime())) return value;
            return new Intl.DateTimeFormat(undefined, { year: 'numeric', month: 'short', day: 'numeric' }).format(date);
        }

        function labelFromType(value) {
            return titleCase(String(value || 'Default').replace(/[-_]+/g, ' '));
        }

        function hasValue(value) {
            return value !== undefined && value !== null && value !== '' && (!Array.isArray(value) || value.length > 0);

                sessionMode: 'normal',

            if (value === 'password') return 'Password';
            if (value === 'private-key') return 'Custom Key';
            return 'Generated Key';
        }

        function hostSessionModeLabel(value) {
            return value === 'persistent' ? 'Persistent Reconnect' : 'Normal SSH';

            return `${host.user || 'root'}@${host.address || 'host'}:${host.port || 22}`;
        }

        function DetailField({ icon, label, value, href }) {

            );
        }

        function OverviewItem({ label, value }) {
            if (!hasValue(value)) return null;
            const display = Array.isArray(value) ? value.join(', ') : String(value);

            return (
                <div className="overview-item">
                    <div className="overview-label">{label}</div>
                    <div className="overview-value">{display}</div>
                </div>
            );
        }

        function InstallMethod({ method }) {
            const resources = method.resources || {};
            const os = [resources.os, resources.version].filter(Boolean).join(' ');
            const items = [
                ['OS', os],
                ['CPU', resources.cpu],
                ['RAM', resources.ram ? `${resources.ram} MB` : ''],
                ['HDD', resources.hdd ? `${resources.hdd} GB` : ''],
            ].filter(([, value]) => hasValue(value));

            return (
                <div className="install-method">
                    <div className="method-title">{labelFromType(method.type)}</div>
                    <div className="resource-pills">
                        {items.map(([label, value]) => (
                            <span key={label} className="resource-pill">{label}: {value}</span>
                        ))}
                    </div>
                </div>
            );
        }

        function scriptCategories(script) {
            if (script.categories?.length && typeof script.categories[0] !== 'string') {
                return script.categories.map(category => category.name || category.title || category.id).filter(Boolean);
            }
            if (script.categories?.length && !String(script.categories[0]).startsWith('scriptcat')) {
                return script.categories;
            }
            if (script.expand?.categories?.length) {
                return script.expand.categories.map(category => category.name || category.title || category.id).filter(Boolean);
            }
            return [];
        }

        function parseRawScriptPath(value) {
            const text = String(value || '');
            const rawMatch = text.match(/raw\.githubusercontent\.com\/community-scripts\/ProxmoxVE\/main\/([^"'\s)]+)/i);
            if (rawMatch) return rawMatch[1];

            const githubMatch = text.match(/github\.com\/community-scripts\/ProxmoxVE\/blob\/main\/([^"'\s)]+)/i);
            return githubMatch ? githubMatch[1] : '';
        }

        function preferredScriptPath(script) {
            const slug = script.slug || slugify(script.name || '');
            if (SCRIPT_PATH_OVERRIDES[slug]) return SCRIPT_PATH_OVERRIDES[slug];

            const explicitPath = script.sourcePath || script.script_path || script.scriptPath || script.file_path || script.path;
            if (explicitPath) return String(explicitPath).replace(/^\/+/, '');

            const rawPath = parseRawScriptPath(script.rawScriptUrl || script.installCommand || script.sourceUrl || script.scriptUrl || '');
            if (rawPath) return rawPath;

            const kind = String(script.type || script.expand?.type?.type || '').toLowerCase();
            if (kind.includes('vm') || slug.endsWith('-vm')) return `vm/${slug}.sh`;
            return `ct/${slug}.sh`;
        }

        function deploySessionName(script) {
            const slug = script.slug || slugify(script.name || 'script');
            return script.sessionName || `pve-${slug}-${Date.now().toString(36)}`;
        }

        function readSidebarCollapsedPreference() {
            try {
                return window.localStorage.getItem('phs-sidebar-collapsed') === '1';
            } catch (error) {
                return false;
            }
        }

        function writeSidebarCollapsedPreference(value) {
            try {
                window.localStorage.setItem('phs-sidebar-collapsed', value ? '1' : '0');
            } catch (error) {}
        }

        function deployPayload(script, size) {
            return {
                name: script.name,
                slug: script.slug || slugify(script.name),
                sessionName: script.sessionName || deploySessionName(script),
                hostId: script.hostId,
                sessionMode: script.sessionMode || 'normal',
                type: script.type,
                sourcePath: script.sourcePath || preferredScriptPath(script),
                rawScriptUrl: script.rawScriptUrl,
                sourceUrl: script.sourceUrl,
                installCommand: script.installCommand,
                cols: size.cols,
                rows: size.rows,
            };
        }

        function SearchModal({ open, query, results, total, inputRef, onQuery, onClose, onRead, onDeploy, onSource }) {

                <div

                    onMouseDown={event => {
                        if (event.target === event.currentTarget) onClose();
                    }}

                                <Icon name="search" />
                                <input
                                    ref={inputRef}
                                    value={query}
                                    onChange={event => onQuery(event.target.value)}
                                    onKeyDown={event => {
                                        if (event.key === 'Escape') {
                                            event.preventDefault();
                                            onClose();
                                        }
                                        if (event.key === 'Enter' && results[0]) {
                                            event.preventDefault();
                                            onRead(results[0]);
                                        }
                                    }}
                                    placeholder="Search all scripts and categories"
                                    aria-label="Search all scripts and categories"
                                />

                            <button className="close-btn" onClick={onClose} title="Close search">

            const removeHost = (index) => {
                onChange({
                    ...settings,
                    hosts: hosts.filter((_, hostIndex) => hostIndex !== index),
