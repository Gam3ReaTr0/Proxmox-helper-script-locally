                                        <button className="secondary-btn" onClick={onGenerateKey}><Icon name="lock" />Generate SSH Key</button>
                                        <p className="settings-hint">The private key stays inside this local app folder. Only the public key goes into Proxmox.</p>
                                    </>
                                )}
                            </section>
                        </div>

                        <div className="settings-footer">
                            <button className="secondary-btn" onClick={onClose}>Cancel</button>
                            <button className="deploy-btn" onClick={onSave}><Icon name="download" />Save</button>
                        </div>
                    </div>
                </div>
            );
        }

        function HostPickerModal({ open, hosts, script, onClose, onSelect }) {
            return (
                <div
                    className={`modal host-picker-modal ${open ? 'open' : ''}`}
                    onMouseDown={event => {
                        if (event.target === event.currentTarget) onClose();
                    }}
                >
                    <div className="host-picker-panel" role="dialog" aria-modal="true" aria-label="Choose Proxmox host">
                        <div className="host-picker-header">
                            <Icon name="server" />
                            <div className="host-picker-title">Deploy {script?.name || 'script'} To</div>
                            <button className="close-btn" onClick={onClose} title="Close host picker">
                                <Icon name="x" />
                            </button>
                        </div>
                        <div className="host-picker-body">
                            <div className="host-picker-list">
                                {hosts.map(host => (
                                    <button key={host.id} className="host-option" onClick={() => onSelect(host.id)}>
                                        <span className="group-icon"><Icon name="server" /></span>
                                        <span>
                                            <div className="host-option-title">{host.name}</div>
                                            <div className="host-option-meta">{hostConnectionLabel(host)} | {hostAuthTypeLabel(host.authType || 'app-key')} | {hostSessionModeLabel(host.sessionMode || 'normal')}</div>
                                        </span>
                                        <span className="deploy-btn"><Icon name="rocket" />Deploy</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [categories, setCategories] = useState({});
            const [selected, setSelected] = useState('');
            const [query, setQuery] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [activeScript, setActiveScript] = useState(null);
            const [showDetail, setShowDetail] = useState(false);
            const [detailScript, setDetailScript] = useState(null);
            const [detailLoading, setDetailLoading] = useState(false);
            const [detailError, setDetailError] = useState('');
            const [showSearch, setShowSearch] = useState(false);
            const [globalQuery, setGlobalQuery] = useState('');
            const [openSidebarGroups, setOpenSidebarGroups] = useState(() => new Set());
            const [sidebarCollapsed, setSidebarCollapsed] = useState(() => readSidebarCollapsedPreference());
            const [settings, setSettings] = useState({ hosts: [], sshKey: null });
            const [showSettings, setShowSettings] = useState(false);
            const [showHostPicker, setShowHostPicker] = useState(false);
            const [pendingDeployScript, setPendingDeployScript] = useState(null);
            const [terminalCloseCountdown, setTerminalCloseCountdown] = useState(0);
            const socket = useRef(io());
            const term = useRef(new Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: 'Consolas, "Cascadia Mono", "Courier New", monospace',
                lineHeight: 1,
                scrollback: 2000,
                theme: {
                    background: '#000000',
                    foreground: '#d7d7d7',
                },
            }));
            const fitAddon = useRef(null);
            const resizeObserver = useRef(null);
            const inputDisposable = useRef(null);
            const customKeyDisposable = useRef(null);
            const modalOpenRef = useRef(false);
            const activeScriptRef = useRef(null);
            const lastDeploySizeRef = useRef({ cols: 120, rows: 36 });
            const restartDeployOnReconnectRef = useRef(false);
            const globalSearchInputRef = useRef(null);
            const autoCloseTimerRef = useRef(null);
            const autoCloseIntervalRef = useRef(null);
            const autoCloseStartedRef = useRef(false);

            function clearAutoCloseCountdown() {
                if (autoCloseTimerRef.current) {
                    clearTimeout(autoCloseTimerRef.current);
                    autoCloseTimerRef.current = null;
                }
                if (autoCloseIntervalRef.current) {
                    clearInterval(autoCloseIntervalRef.current);
                    autoCloseIntervalRef.current = null;
                }
                autoCloseStartedRef.current = false;
                setTerminalCloseCountdown(0);
            }

            function startTerminalAutoClose() {
                if (!modalOpenRef.current || autoCloseStartedRef.current) return;

                autoCloseStartedRef.current = true;
                let remainingSeconds = 15;
                setTerminalCloseCountdown(remainingSeconds);
                term.current.write(`\r\n\x1b[32m[Success] Closing terminal in ${remainingSeconds}s...\x1b[0m`);

                autoCloseIntervalRef.current = setInterval(() => {
                    remainingSeconds -= 1;

                    if (remainingSeconds <= 0) {
                        if (autoCloseIntervalRef.current) {
                            clearInterval(autoCloseIntervalRef.current);
                            autoCloseIntervalRef.current = null;
                        }
                        setTerminalCloseCountdown(0);
                        return;
                    }

                    setTerminalCloseCountdown(remainingSeconds);
                    term.current.write(`\r\x1b[2K\x1b[32m[Success] Closing terminal in ${remainingSeconds}s...\x1b[0m`);
                }, 1000);

                autoCloseTimerRef.current = setTimeout(() => {
                    closeTerminal();
                }, 15000);
            }

            useEffect(() => {
                if (!fitAddon.current && window.FitAddon) {
                    fitAddon.current = new FitAddon.FitAddon();
                    term.current.loadAddon(fitAddon.current);
                }

                fetch('/api/scripts')
                    .then(r => {
                        if (!r.ok) throw new Error('Failed to load scripts');
                        return r.json();
                    })
                    .then(data => {
                        const normalized = normalizeScripts(data);
                        const categoryNames = Object.keys(normalized);
                        const requestedScriptSlug = scriptSlugFromPath();
                        const requestedScript = requestedScriptSlug
                            ? Object.values(normalized)
                                .flat()
                                .find(script => (script.slug || slugify(script.name)) === requestedScriptSlug)
                            : null;
                        const requestedScriptCategory = requestedScript
                            ? Object.entries(normalized)
                                .find(([, scripts]) => scripts.some(script => (script.slug || slugify(script.name)) === requestedScriptSlug))?.[0]
                            : '';

                        setCategories(normalized);
                        setSelected(categoryFromUrl(categoryNames) || requestedScriptCategory || categoryNames[0] || '');
                        if (requestedScriptSlug) {
                            openDetails(requestedScript || { slug: requestedScriptSlug, name: labelFromType(requestedScriptSlug) }, false);
                        }
                        setError('');
                    })
                    .catch(err => setError(err.message))
                    .finally(() => setLoading(false));

                fetch('/api/settings')
                    .then(r => {
                        if (!r.ok) throw new Error('Failed to load settings');
                        return r.json();
                    })
                    .then(data => setSettings(data))
                    .catch(() => setSettings({ hosts: [], sshKey: null }));

                const handleOutput = d => term.current.write(d);
                const handleServerDisconnect = () => {
                    if (modalOpenRef.current) {
                        if (activeScriptRef.current) restartDeployOnReconnectRef.current = true;
                        term.current.write(
                            activeScriptRef.current?.sessionMode === 'persistent'
                                ? '\r\n\x1b[33m[Local server disconnected. The remote persistent session should keep running on the host. Reconnecting will reattach it.]\x1b[0m\r\n'
                                : '\r\n\x1b[33m[Local server disconnected. The normal SSH attachment stops when the server restarts.]\x1b[0m\r\n'
                        );
                    }
                };
                const handleServerConnect = () => {
                    if (modalOpenRef.current) {
                        if (restartDeployOnReconnectRef.current && activeScriptRef.current) {
                            restartDeployOnReconnectRef.current = false;
                            const size = fitTerminal();
                            lastDeploySizeRef.current = size;
                            term.current.write(
                                activeScriptRef.current?.sessionMode === 'persistent'
                                    ? `\r\n\x1b[36m[Local server reconnected. Reattaching the persistent deploy session for ${activeScriptRef.current.name || activeScriptRef.current.slug}...]\x1b[0m\r\n`
                                    : `\r\n\x1b[36m[Local server reconnected. Starting a fresh normal SSH session for ${activeScriptRef.current.name || activeScriptRef.current.slug}...]\x1b[0m\r\n`
                            );
                            socket.current.emit('deploy', deployPayload(activeScriptRef.current, size));
                        } else {
                            term.current.write('\r\n\x1b[36m[Local server reconnected.]\x1b[0m\r\n');
                        }
                    }
                };
                const handleDeployExit = ({ exitCode } = {}) => {
                    activeScriptRef.current = null;
                    restartDeployOnReconnectRef.current = false;

                    if (exitCode === 0 && modalOpenRef.current) {
                        startTerminalAutoClose();
                        return;
                    }

                    clearAutoCloseCountdown();
                };
                const handleDeploySuccess = () => {
                    startTerminalAutoClose();
                };

                socket.current.on('output', handleOutput);
                socket.current.on('disconnect', handleServerDisconnect);
                socket.current.on('connect', handleServerConnect);
                socket.current.on('deploy-success', handleDeploySuccess);
                socket.current.on('deploy-exit', handleDeployExit);
                inputDisposable.current = term.current.onData(data => socket.current.emit('input', data));
                customKeyDisposable.current = term.current.attachCustomKeyEventHandler(event => {
                    if (!modalOpenRef.current || event.type !== 'keydown') return true;

                    const keyMap = {
                        ArrowUp: '\x1b[A',
                        ArrowDown: '\x1b[B',
                        ArrowRight: '\x1b[C',
                        ArrowLeft: '\x1b[D',
                        Enter: '\r',
                        Tab: event.shiftKey ? '\x1b[Z' : '\t',
                        Backspace: '\x7f',
                        Escape: '\x1b',
                    };

                    let data = keyMap[event.key];
                    if (event.ctrlKey && event.key.toLowerCase() === 'c') data = '\x03';
                    if (event.ctrlKey && event.key.toLowerCase() === 'd') data = '\x04';
                    if (!data) return true;

                    event.preventDefault();
                    socket.current.emit('input', data);
                    return false;
                });

                const handleWindowResize = () => {
                    if (modalOpenRef.current) requestAnimationFrame(fitTerminal);
                };

                const terminalHasFocus = () => {
                    const element = term.current.element;
                    const active = document.activeElement;
                    return Boolean(element && active && (element.contains(active) || element.classList.contains('focus')));
                };

                const handleKeyDown = event => {
                    if (!modalOpenRef.current) return;
                    if (terminalHasFocus()) return;

                    if (event.key === 'Tab') {
                        event.preventDefault();
                        term.current.focus();
                        return;
                    }

                    const keyMap = {
                        ArrowUp: '\x1b[A',
                        ArrowDown: '\x1b[B',
                        ArrowRight: '\x1b[C',
                        ArrowLeft: '\x1b[D',
                        Enter: '\r',
                        Backspace: '\x7f',
                        Escape: '\x1b',
                    };

                    let data = keyMap[event.key];
                    if (event.ctrlKey && event.key.toLowerCase() === 'c') data = '\x03';
                    if (event.ctrlKey && event.key.toLowerCase() === 'd') data = '\x04';
                    if (!data && event.key.length === 1 && !event.metaKey && !event.altKey) data = event.key;
                    if (!data) return;

                    event.preventDefault();
                    socket.current.emit('input', data);
                    term.current.focus();
                };

                window.addEventListener('resize', handleWindowResize);
                document.addEventListener('keydown', handleKeyDown, true);

                return () => {
                    socket.current.off('output', handleOutput);
                    socket.current.off('disconnect', handleServerDisconnect);
                    socket.current.off('connect', handleServerConnect);
                    socket.current.off('deploy-success', handleDeploySuccess);
                    socket.current.off('deploy-exit', handleDeployExit);
                    inputDisposable.current?.dispose();
                    customKeyDisposable.current?.dispose();
                    resizeObserver.current?.disconnect();
                    clearAutoCloseCountdown();
                    window.removeEventListener('resize', handleWindowResize);
                    document.removeEventListener('keydown', handleKeyDown, true);
                };
            }, []);

            const categoryNames = Object.keys(categories);
            const scripts = categories[selected] || [];
            const sidebarGroups = useMemo(() => sidebarGroupsForCategories(categoryNames), [categories]);
            const totalScripts = useMemo(
                () => Object.values(categories).reduce((total, list) => total + list.length, 0),
                [categories]
            );

            useEffect(() => {
                if (!selected) return;

                const group = sidebarGroups.find(item => item.categories.includes(selected));
                if (!group) return;

                setOpenSidebarGroups(current => {
                    if (current.has(group.name)) return current;
                    const next = new Set(current);
                    next.add(group.name);
                    return next;
                });
            }, [selected, sidebarGroups]);

            useEffect(() => writeSidebarCollapsedPreference(sidebarCollapsed), [sidebarCollapsed]);

            const filteredScripts = useMemo(() => {
                const q = query.trim().toLowerCase();
                if (!q) return scripts;
                return scripts.filter(script => {
                    const haystack = `${script.name || ''} ${cleanText(script.description)} ${script.slug || ''}`.toLowerCase();
                    return haystack.includes(q);
                });
            }, [query, scripts]);

            const globalScripts = useMemo(() => {
                const byScript = new Map();

                Object.entries(categories).forEach(([categoryName, scriptList]) => {
                    scriptList.forEach(script => {
                        const key = script.slug || slugify(script.name);
                        const existing = byScript.get(key);
                        const mergedCategories = [
                            ...(existing?.categories || scriptCategories(script)),
                            categoryName,
                        ].filter(Boolean);

                        byScript.set(key, {
                            ...(existing || script),
                            ...script,
                            categories: [...new Set(mergedCategories)],
                        });
                    });
                });

                return Array.from(byScript.values())
                    .sort((a, b) => String(a.name || '').localeCompare(String(b.name || '')));
            }, [categories]);

            const globalSearchResults = useMemo(() => {
                const q = globalQuery.trim().toLowerCase();
                const ranked = globalScripts.map(script => {
                    const categoriesText = scriptCategories(script).join(' ');
                    const notesText = normalizeNotes(script.notes).map(note => note.text).join(' ');
                    const haystack = [
                        script.name,
                        script.slug,
                        cleanText(script.description),
                        categoriesText,
                        notesText,
                        script.type,
                        script.sourcePath,
                    ].join(' ').toLowerCase();

                    let score = 0;
                    if (!q) score = 1;
                    else if (String(script.name || '').toLowerCase().startsWith(q)) score = 4;
                    else if (String(script.name || '').toLowerCase().includes(q)) score = 3;
                    else if (categoriesText.toLowerCase().includes(q)) score = 2;
                    else if (haystack.includes(q)) score = 1;

                    return { script, score };
                }).filter(item => item.score > 0);

                return ranked
                    .sort((a, b) => b.score - a.score || String(a.script.name || '').localeCompare(String(b.script.name || '')))
                    .slice(0, 80)
                    .map(item => item.script);
            }, [globalQuery, globalScripts]);

            const measureCell = () => {
                const probe = document.createElement('span');
                probe.textContent = 'W';
                probe.style.position = 'absolute';
                probe.style.visibility = 'hidden';
                probe.style.whiteSpace = 'pre';
                probe.style.fontFamily = 'Consolas, "Cascadia Mono", "Courier New", monospace';
                probe.style.fontSize = '14px';
                probe.style.lineHeight = '14px';
                document.body.appendChild(probe);
                const rect = probe.getBoundingClientRect();
                probe.remove();

                return {
                    width: rect.width || 8,
                    height: rect.height || 14,
                };
            };

            const calculateTerminalSize = () => {
                const terminalBody = document.getElementById('term-body');
                if (!terminalBody) return { cols: 120, rows: 36 };

                const rect = terminalBody.getBoundingClientRect();
                const cell = measureCell();

                return {
                    cols: Math.max(80, Math.min(Math.floor(rect.width / cell.width), 240)),
                    rows: Math.max(24, Math.min(Math.floor(rect.height / cell.height), 80)),
                };
            };

            const fitTerminal = () => {
                const size = calculateTerminalSize();

                try {
                    term.current.resize(size.cols, size.rows);
                } catch (_err) {
                    if (fitAddon.current && term.current.element) {
                        fitAddon.current.fit();
                    }
                }

                socket.current.emit('resize', size);
                return size;
            };

            const openTerminal = () => {
                const terminalBody = document.getElementById('term-body');
                if (!terminalBody) return { cols: 120, rows: 36 };

                if (!term.current.element) {
                    term.current.open(terminalBody);
                }

                if (!resizeObserver.current && window.ResizeObserver) {
                    resizeObserver.current = new ResizeObserver(() => {
                        requestAnimationFrame(fitTerminal);
                    });
                    resizeObserver.current.observe(terminalBody);
                }

                const size = fitTerminal();
                setTimeout(() => {
                    fitTerminal();
                    term.current.focus();
                }, 0);

                return size;
            };

            const startDeployToHost = (script, hostId) => {
                clearAutoCloseCountdown();

                const selectedHost = (settings.hosts || []).find(host => host.id === hostId) || {};

                const deployScript = {
                    ...script,
                    hostId,
                    sessionName: deploySessionName(script),
                    sessionMode: selectedHost.sessionMode || 'normal',
                    hostName: selectedHost.name || '',
                };

                setShowDetail(false);
                setActiveScript(deployScript);
                activeScriptRef.current = deployScript;
                restartDeployOnReconnectRef.current = false;
                modalOpenRef.current = true;
                setShowModal(true);
                setTimeout(() => {
                    const size = openTerminal();
                    lastDeploySizeRef.current = size;
                    term.current.clear();
                    socket.current.emit('deploy', deployPayload(deployScript, size));
                }, 100);
            };

            const deploy = (script) => {
                const hosts = settings.hosts || [];

                if (hosts.length === 0) {
                    setShowSettings(true);
                    return;
                }

                if (hosts.length > 1) {
                    setPendingDeployScript(script);
                    setShowHostPicker(true);
                    return;
                }

                startDeployToHost(script, hosts[0].id);
            };

            const openDetails = (script, updateUrl = true) => {
                const slug = script.slug || slugify(script.name);
                const scriptWithFallbacks = {
                    ...script,
                    categories: scriptCategories(script).length ? scriptCategories(script) : selected ? [selected] : [],
                };

                setDetailScript(scriptWithFallbacks);
                setDetailError('');
                setDetailLoading(true);
                setShowDetail(true);
                if (updateUrl && slug) {
                    window.history.replaceState({}, '', `/scripts/${encodeURIComponent(slug)}`);
                }

                fetch(`/api/scripts/${encodeURIComponent(slug)}`)
                    .then(r => {
                        if (!r.ok) throw new Error('Failed to load script details');
                        return r.json();
                    })
                    .then(data => {
                        setDetailScript({ ...scriptWithFallbacks, ...data });
                        setDetailError('');
                    })
                    .catch(err => setDetailError(err.message))
                    .finally(() => setDetailLoading(false));
            };

            const openSearch = () => {
                setShowSearch(true);
                setTimeout(() => globalSearchInputRef.current?.focus(), 0);
            };

            const closeSearch = () => {
                setShowSearch(false);
            };

            const readFromSearch = (script) => {
                const categoriesForScript = scriptCategories(script);
                const nextCategory = categoriesForScript.find(categoryName => categories[categoryName]) || selected;

                if (nextCategory) {
                    setSelected(nextCategory);
                    setQuery('');
                }

                setShowSearch(false);
                openDetails(script);
            };

            const deployFromSearch = (script) => {
                setShowSearch(false);
                deploy(script);
            };

            const saveSettings = () => {
                fetch('/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings),
                })
                    .then(r => {
                        if (!r.ok) throw new Error('Failed to save settings');
                        return r.json();
                    })
                    .then(data => {
                        setSettings(data);
                        setShowSettings(false);
                    })
                    .catch(err => alert(err.message));
            };

            const generateKey = () => {
                fetch('/api/settings/ssh-key', { method: 'POST' })
                    .then(r => {
                        if (!r.ok) throw new Error('Failed to generate SSH key');
                        return r.json();
                    })
                    .then(data => setSettings(data))
                    .catch(err => alert(err.message));
            };

            const copyPublicKey = () => {
                const publicKey = settings.sshKey?.publicKey || '';
                if (!publicKey) return;
                navigator.clipboard?.writeText(publicKey).catch(() => {});
            };

            const selectDeployHost = (hostId) => {
                if (!pendingDeployScript) return;
                setShowHostPicker(false);
                const script = pendingDeployScript;
                setPendingDeployScript(null);
                startDeployToHost(script, hostId);
            };

            const openSource = (script) => {
                window.open(script.sourceUrl || githubUrlForPath(preferredScriptPath(script)), '_blank', 'noopener,noreferrer');
            };

            const closeTerminal = () => {
                clearAutoCloseCountdown();

                modalOpenRef.current = false;
                socket.current.emit('detach');
                activeScriptRef.current = null;
                restartDeployOnReconnectRef.current = false;
                setShowModal(false);
            };

            const closeDetails = () => {
                setShowDetail(false);
                if (window.location.pathname.startsWith('/scripts/')) {
                    const url = new URL('/categories', window.location.origin);
                    if (selected) url.searchParams.set('category', categorySlug(selected));
                    window.history.replaceState({}, '', url);
                }
            };

            const selectCategory = (categoryName) => {
                setSelected(categoryName);
                setQuery('');

                const url = new URL('/categories', window.location.origin);
                url.searchParams.set('category', categorySlug(categoryName));
                window.history.replaceState({}, '', url);
            };

            const toggleSidebarGroup = (groupName) => {
                setOpenSidebarGroups(current => {
                    const next = new Set(current);
                    if (next.has(groupName)) {
                        next.delete(groupName);
                    } else {
                        next.add(groupName);
                    }
                    return next;
                });
            };

            return (
                <div className={`app-shell ${sidebarCollapsed ? 'sidebar-collapsed' : ''}`}>
                    <aside className="sidebar">
                        <div className="brand">
                            <div className="brand-main">
                                <span className="brand-mark" title="Proxmox Helper Scripts"><Icon name="library" /></span>
                                <div className="brand-copy">
                                    <div className="brand-title">Proxmox Helper Scripts</div>
                                    <div className="brand-subtitle">{totalScripts || 'Loading'} scripts</div>
                                </div>
                            </div>
                        </div>
                        <div className="sidebar-sections">
                            <div className="sidebar-heading">Sections</div>
                            <div className="sidebar-groups">
                                {sidebarGroups.map(group => {
                                    const isOpen = openSidebarGroups.has(group.name);
                                    const groupTotal = group.categories.reduce((total, categoryName) => total + (categories[categoryName]?.length || 0), 0);

                                    return (
                                        <section key={group.name} className={`sidebar-group ${isOpen ? 'open' : ''}`}>
                                            <button
                                                className="sidebar-group-toggle"
                                                onClick={() => toggleSidebarGroup(group.name)}
                                                title={`${group.name} sections`}
                                                aria-expanded={isOpen}
                                            >
                                                <span className="group-icon"><Icon name={group.icon} /></span>
                                                <span className="group-name">{group.name}</span>
                                                <span className="group-count">{groupTotal}</span>
                                                <span className="group-chevron"><Icon name="chevron" /></span>
                                            </button>
                                            <div className="sidebar-group-list">
                                                {group.categories.map(cat => (
                                                    <button
                                                        key={cat}
                                                        className={`sidebar-item ${selected === cat ? 'active' : ''}`}
                                                        onClick={() => selectCategory(cat)}
                                                        title={displayCategoryName(cat)}
                                                    >
                                                        <span className="category-icon"><Icon name={categoryIconName(cat)} title={displayCategoryName(cat)} /></span>
                                                        <span className="category-name">{displayCategoryName(cat)}</span>
                                                        <span className="count-pill">{categories[cat].length}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </section>
                                    );
                                })}
                            </div>
                        </div>
                        <div className="sidebar-bottom">
                            <div className="sidebar-toolbar">
                                <button className="sidebar-settings-btn" onClick={() => setShowSettings(true)} title="Settings">
                                    <Icon name="settings" />
                                    <span className="sidebar-settings-label">Settings</span>
                                </button>
                                <button
                                    className="sidebar-view-btn"
                                    onClick={() => setSidebarCollapsed(current => !current)}
                                    title={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}
                                    aria-label={sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'}
                                >
                                    <Icon name={sidebarCollapsed ? 'panel-open' : 'panel-close'} />
                                </button>
                            </div>
                        </div>
                    </aside>

                    <main className="main">
                        <div className="main-stage">
                            <section className="topbar">
                                <div className="topbar-lead">
                                    <div className="topbar-icon"><Icon name={categoryIconName(selected || '')} /></div>
                                    <div className="topbar-copy">
                                        <div className="eyebrow">Script Library</div>
                                        <h1>{displayCategoryName(selected || 'Loading')}</h1>
                                        <div className="header-meta">
                                            <span className="meta-pill"><Icon name={categoryIconName(selected || '')} />{scripts.length} in category</span>
                                            <span className="meta-pill"><Icon name="library" />{categoryNames.length} categories</span>
                                            <span className="meta-pill"><Icon name="spark" />{totalScripts} total</span>
                                        </div>
                                    </div>
                                </div>
                                <div className="topbar-actions">
                                    <div className="topbar-label">Search Library</div>
                                    <div className="search-shell">
                                        <label className="search-box">
                                            <span className="search-box-icon"><Icon name="search" /></span>
                                            <input
                                                value={globalQuery}
                                                onFocus={openSearch}
                                                onClick={openSearch}
                                                onChange={event => {
                                                    setGlobalQuery(event.target.value);
                                                    setShowSearch(true);
                                                }}
                                                placeholder="Search all scripts"
                                                aria-label="Search all scripts"
                                            />
                                            <span className="search-meta"><Icon name="library" />{totalScripts} scripts</span>
                                        </label>
                                    </div>
                                </div>
                            </section>

                            {loading && <div className="loading-state">Loading scripts...</div>}
                            {!loading && error && <div className="error-state">{error}</div>}
                            {!loading && !error && filteredScripts.length === 0 && (
                                <div className="empty-state">No scripts found in this category.</div>
                            )}

                            {!loading && !error && filteredScripts.length > 0 && (
                                <section className="grid">
                                    {filteredScripts.map(script => (
                                        <article key={script.slug || script.name} className="card">
                                            <div className="card-main">
                                                <div
                                                    className="card-top readable"
                                                    onClick={() => openDetails(script)}
                                                    onKeyDown={event => {
                                                        if (event.key === 'Enter' || event.key === ' ') {
                                                            event.preventDefault();
                                                            openDetails(script);
                                                        }
                                                    }}
                                                    role="button"
                                                    tabIndex="0"
                                                    title={`Read about ${script.name}`}
                                                >
                                                    <div className="card-top-main">
                                                        <ScriptLogo script={script} />
                                                        <div className="script-title-wrap">
                                                            <h2>{script.name}</h2>
                                                            <ScriptBadges script={script} />
                                                        </div>
                                                    </div>
                                                    <span className="card-top-cue" aria-hidden="true">
                                                        <Icon name="chevron" />
                                                    </span>
                                                </div>
                                                <div className="card-summary">
                                                    <p>{cleanText(script.description) || 'Proxmox Helper Script installation.'}</p>
                                                </div>
                                            </div>
                                            <div className="card-actions">
                                                <button className="deploy-btn" onClick={() => deploy(script)} title={`Deploy ${script.name}`}>
                                                    <Icon name="rocket" />Deploy
                                                </button>
                                                <button className="read-btn" onClick={() => openDetails(script)} title={`Read about ${script.name}`}>
                                                    <Icon name="info" />Read
                                                </button>
                                                <button className="icon-btn" onClick={() => openSource(script)} title="Open script source">
                                                    <Icon name="file" />
                                                </button>
                                            </div>
                                        </article>
                                    ))}
                                </section>
                            )}
                        </div>
                    </main>

                    <DetailModal
                        open={showDetail}
                        script={detailScript}
                        loading={detailLoading}
                        error={detailError}
                        onClose={closeDetails}
                        onDeploy={deploy}
                        onSource={openSource}
                    />

                    <SearchModal
                        open={showSearch}
                        query={globalQuery}
                        results={globalSearchResults}
                        total={globalScripts.length}
                        inputRef={globalSearchInputRef}
                        onQuery={setGlobalQuery}
                        onClose={closeSearch}
                        onRead={readFromSearch}
                        onDeploy={deployFromSearch}
                        onSource={openSource}
                    />

                    <SettingsModal
                        open={showSettings}
                        settings={settings}
                        onClose={() => setShowSettings(false)}
                        onChange={setSettings}
                        onSave={saveSettings}
                        onGenerateKey={generateKey}
                        onCopyKey={copyPublicKey}
                    />

                    <HostPickerModal
                        open={showHostPicker}
                        hosts={settings.hosts || []}
                        script={pendingDeployScript}
                        onClose={() => {
                            setShowHostPicker(false);
                            setPendingDeployScript(null);
                        }}
                        onSelect={selectDeployHost}
                    />

                    <div className={`modal ${showModal ? 'open' : ''}`} onMouseDown={() => term.current.element && term.current.focus()}>
                        <div id="terminal-box">
                            <div className="terminal-header">
                                <Icon name="rocket" />
                                <div className="terminal-title">{activeScript ? activeScript.name : 'Deploy script'}</div>
                                {terminalCloseCountdown > 0 && (
                                    <div className="terminal-countdown">Closing in {terminalCloseCountdown}s</div>
                                )}
                                <div className="terminal-spacer"></div>
                                <button className="close-btn" onClick={closeTerminal} title="Close terminal">
                                    <Icon name="x" />
                                </button>
                            </div>
                            <div id="term-body"></div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
